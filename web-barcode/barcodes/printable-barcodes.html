<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Barcode Buku Perpustakaan</title>
    <script src="../barcode.js" defer></script>
    <script defer>
      function loadBookDatabase() {
        const stored = localStorage.getItem("bookDatabase");
        return stored ? JSON.parse(stored) : { ...window.defaultBookDatabase };
      }

      function renderBarcodeCards() {
        const grid = document.querySelector("#barcodeGrid");
        const database = loadBookDatabase();
        grid.innerHTML = "";

        Object.entries(database)
          .sort(([codeA], [codeB]) => codeA.localeCompare(codeB))
          .forEach(([code, title]) => {
            const card = document.createElement("article");
            const label = document.createElement("div");
            const strong = document.createElement("strong");
            const span = document.createElement("span");

            card.className = "card";
            card.innerHTML = window.renderCode128Svg(code, title);
            strong.textContent = code;
            span.textContent = title;
            label.append(strong, span);
            card.appendChild(label);
            grid.appendChild(card);
          });
      }

      window.addEventListener("DOMContentLoaded", renderBarcodeCards);
    </script>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: #f4f6f8;
        color: #202124;
        font-family: Arial, sans-serif;
      }
      main {
        width: min(980px, calc(100% - 28px));
        margin: 0 auto;
        padding: 24px 0;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }
      h1 { margin: 0; font-size: 28px; }
      button, a {
        min-height: 42px;
        border: 0;
        border-radius: 6px;
        background: #146c94;
        color: #ffffff;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        font: inherit;
        font-weight: 700;
        padding: 10px 14px;
        text-decoration: none;
      }
      a { background: #e6f3f1; color: #0f5f55; }
      .actions { display: flex; gap: 8px; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 14px;
      }
      .card {
        border: 1px solid #d9dee8;
        border-radius: 8px;
        background: #ffffff;
        padding: 14px;
        page-break-inside: avoid;
      }
      svg { width: 100%; height: auto; display: block; }
      strong, span { display: block; text-align: center; }
      strong { margin-top: 8px; font-size: 18px; }
      span { color: #626975; }
      @media (max-width: 640px) {
        .topbar, .actions { align-items: stretch; flex-direction: column; }
      }
      @media print {
        body { background: #ffffff; }
        main { width: 100%; padding: 0; }
        .topbar { display: none; }
        .card { box-shadow: none; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="topbar">
        <h1>Barcode Buku Perpustakaan</h1>
        <div class="actions">
          <a href="../index.html">Kembali</a>
          <button type="button" onclick="window.print()">Cetak</button>
        </div>
      </div>
      <section id="barcodeGrid" class="grid" aria-label="Daftar barcode buku"></section>
    </main>
  </body>
</html>
